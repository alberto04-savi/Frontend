<!DOCTYPE html>
<html lang="it">


<!--Contiene i metadati (informazioni per i motori di ricerca, link ai fogli di stile CSS) e il <title>,
   che è il testo visibile nella scheda del browser (in questo caso "PAWTAL"). 
   L'utente non vede il contenuto di <head> direttamente nella pagina.-->

<head>

  <!-- specifica la codifica dei caratteri -->
  <meta charset="utf-8">
  <title>PAWTAL</title>
  <base href="/">

  <link rel="stylesheet" href="styles.css">
  
  <link rel="icon" type="image/png" href="immagini/logo.png">
</head>

<body>
  <!-- <app-root> è il componente radice dell'app Angular (definito in app.ts). -->
  <!-- Angular prende il controllo di questo tag e inietta dinamicamente tutto il contenuto dell'applicazione (router, pagine, componenti) al suo interno. -->
   <!--definito in app.ts nel selector il quale dice ogni volta che trovi app-root metti app.html-->
  <app-root></app-root> 
</body>

</html>
